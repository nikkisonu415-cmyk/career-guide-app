<body>

<h2>Find Best Career for You</h2>

<!-- Interest -->
<select id="interest"></select>

<!-- Budget -->
<input id="budget" placeholder="Max Budget (₹)">

<!-- Min Salary -->
<input id="salary" placeholder="Expected Salary (₹)">

<button onclick="findBest()">Find</button>

<div id="result"></div>

<script src="../data/careers.js"></script>

<script>
// get dropdown
const interestDropdown = document.getElementById("interest");

// get unique categories
let categories = [...new Set(careers.map(c => c.category))];

// add All option
interestDropdown.innerHTML = `<option value="All">All Categories</option>`;

// populate dropdown
categories.forEach(cat => {
  interestDropdown.innerHTML += `<option value="${cat}">${cat}</option>`;
});
</script>

<script>
function findBest() {
  let interest = document.getElementById("interest").value;
  let budget = document.getElementById("budget").value;
  let salary = document.getElementById("salary").value;

  let filtered = careers.filter(c =>
  (interest === "All" || c.category === interest) &&
  c.cost <= budget &&
  c.salary >= salary
  );

  if (filtered.length === 0) {
    document.getElementById("result").innerHTML =
      "<p>No career found. Try changing inputs.</p>";
    return;
  }

  // pick best = highest salary
  let best = filtered.reduce((a, b) => {
  let scoreA = a.salary - a.cost;
  let scoreB = b.salary - b.cost;
  return scoreA > scoreB ? a : b;
});

  document.getElementById("result").innerHTML = `
  <div class="best-card">
    <h2>🎯 ${best.name}</h2>
    <p>💰 Salary: ₹${best.salary}</p>
    <p>📉 Cost: ₹${best.cost}</p>
    <p>⏳ Duration: ${best.duration} years</p>
    <p>📂 Category: ${best.category}</p>
  </div>
`;
}
</script>

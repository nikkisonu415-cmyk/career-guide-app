<head>
  <title>Careers</title>

<body>

<h2>Explore Careers</h2>

<input type="text" id="search" placeholder="Search career..." onkeyup="filterData()">

<select id="category" onchange="filterData()">
  <option value="All">All Categories</option>
  <option value="Technology">Technology</option>
  <option value="Medical">Medical</option>
  <option value="Finance">Finance</option>
  <option value="Law">Law</option>
  <option value="Education">Education</option>
  <option value="Engineering">Engineering</option>
  <option value="Aviation">Aviation</option>
  <option value="Hospitality">Hospitality</option>
  <option value="Creative">Creative</option>
  <option value="Media">Media</option>
  <option value="Government">Government</option>
  <option value="Business">Business</option>
  <option value="Healthcare">Healthcare</option>
</select>

<div id="careerList"></div>

<script src="../data/careers.js"></script>

<script>
const container = document.getElementById("careerList");

function display(data) {
  container.innerHTML = "";

  data.forEach(c => {
    container.innerHTML += `
      <div class="card">
        <div class="card-header">
          <h3>${c.name}</h3>
          <span class="badge">${c.category}</span>
        </div>

        <div class="card-body">
          <p>⏳ ${c.duration} years</p>
          <p>💰 ₹${c.cost}</p>
          <p>📈 ₹${c.salary}</p>
        </div>

        <div class="card-footer">
          <small>🎓 ${c.prerequisites}</small><br>
          <small>📚 ${c.resources}</small>
        </div>
      </div>
    `;
  });
}

function filterData() {
  let search = document.getElementById("search").value.toLowerCase();
  let category = document.getElementById("category").value;

  let filtered = careers.filter(c =>
    c.name.toLowerCase().includes(search) &&
    (category === "All" || c.category === category)
  );

  display(filtered);
}

display(careers);
</script>
